name: Automated API Documentation Sync

on:
  push:
    branches: [ "main" ]

jobs:
  update-api-documentation:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Grants the workflow authority to push changes back to the repository

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Application Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask requests python-dotenv flasgger flask-cors

    - name: Generate Markdown API Schema
      run: |
        cat << 'EOF' > generate_docs.py
        import os
        import sys
        # Emulate required environment variables to prevent initialization crashes
        os.environ["NEWS_API_KEY"] = "mock_key"
        
        try:
            from main import app
            print("Successfully inspected application layers.")
        except Exception as e:
            print(f"Extraction failure: {e}")
            sys.exit(1)
            
        with app.test_request_context():
            markdown_output = "### 🚀 Automated API Endpoint Registry\n\n"
            markdown_output += "| Method | Endpoint | Description | Query Parameters |\n"
            markdown_output += "| :--- | :--- | :--- | :--- |\n"
            
            for rule in app.url_map.iter_rules():
                if rule.endpoint != 'static':
                    methods = ', '.join([m for m in rule.methods if m not in ['OPTIONS', 'HEAD']])
                    docstring = app.view_functions[rule.endpoint].__doc__
                    clean_doc = docstring.strip().split('\n')[0] if docstring else "No description provided."
                    
                    params = "None"
                    if "search" in rule.rule:
                        params = "`q` (Required search term)"
                        
                    markdown_output += f"| **{methods}** | `{rule.rule}` | {clean_doc} | {params} |\n"
            
            # Read current README
            with open("README.md", "r", encoding="utf-8") as f:
                readme_content = f.read()
            
            # Strategy to cleanly overwrite or append the documentation block
            marker = "## 🛠 API Reference"
            if marker in readme_content:
                base_content = readme_content.split(marker)[0]
                new_readme = base_content + marker + "\n\n" + markdown_output
            else:
                new_readme = readme_content + "\n\n" + marker + "\n\n" + markdown_output
                
            with open("README.md", "w", encoding="utf-8") as f:
                f.write(new_readme)
            print("API Documentation successfully baked into README.md")
        EOF
        python generate_docs.py

    - name: Commit and Push Documentation Updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git diff-index --quiet HEAD || git commit -m "docs: automated synchronization of API endpoints [skip ci]"
        git push